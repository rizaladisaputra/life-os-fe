name: lifeos_app
description: LifeOS - Personal Operating System untuk kehidupan seimbang
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.0.0

  # Local Database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.3

  # UI & Animation
  google_fonts: ^6.2.1
  lucide_icons: any
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.2

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Image
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  isar_generator: ^3.1.0
  riverpod_generator: ^2.3.3
  custom_lint: any
  riverpod_lint: any

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
